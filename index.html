function getToken(){return sessionStorage.getItem('sgel_jwt')||'';}
function setToken(t){sessionStorage.setItem('sgel_jwt',t);}
function clearToken(){sessionStorage.removeItem('sgel_jwt');}
async function api(method,path,body){
  const opts={method,headers:{'Content-Type':'application/json','Authorization':'Bearer '+getToken()}};
  if(body)opts.body=JSON.stringify(body);
  let r;
  try{r=await fetch(API_BASE+path,opts);}
  catch(e){toast('Sin conexión. Verificá tu internet.',true);throw e;}
  if(r.status===401){
    clearToken();S.logueado=false;S.db=[];
    S.login={user:'',pass:'',err:'Tu sesión expiró. Iniciá sesión de nuevo.'};
    S.view='login';render();throw new Error('Sesión expirada');
  }
  if(!r.ok){
    const e=await r.json().catch(()=>({}));
    const msg=r.status===403?'No tenés permisos para esta acción.':
              r.status===404?'No encontramos lo que buscabas.':
              r.status===500?'Problema en el servidor. Intentá en unos minutos.':
              (e.error||'Ocurrió un error inesperado.');
    toast(msg,true);
    throw new Error(e.error||`Error ${r.status}`);
  }
  return r.json();
}
// Mapping: API row → S.db item
function mapExpFromAPI(e){
  return{id:e.id,cuij:e.numero||'',car:e.caratula,actor:e.actor||'',demandado:e.demandado||'',
    rol:e.rol||'Actor',sede:e.juzgado||e.ciudad||'',ciudad:e.ciudad||'',trNom:e.tr_nom||'',
    trJuez:e.tr_juez||'',trSec:e.tr_sec||'',trEmail:e.tr_email||'',trTel:e.tr_tel||'',
    etapa:e.etapa||'',estado:e.estado||'activo',monto:parseFloat(e.monto)||0,
    montoAcordado:parseFloat(e.monto_acordado)||0,ibm:parseFloat(e.ibm)||0,incap:parseFloat(e.incap)||0,
    cliente:e.cliente||'',clienteTel:e.cliente_tel||'',folio:e.folio||'',notas:e.notas||'',
    abogado:e.abogado||'',_fecha_ultima_actuacion:e.fecha_ultima_actuacion||e.updated_at,
    evs:[],escritos:[],cedulas:[],concil:[],log:[],adjuntos:[],_detailLoaded:false};
}
function mapEvFromAPI(ev){
  if(ev.tipo==='audiencia')
    return{id:ev.id,tipo:'audiencia',desc:ev.descripcion,fecha:ev.fecha+'T'+(ev.hora||'10:00:00'),suj:ev.suj||'propio'};
  let c={nota:null,venc:null,gr:null};
  const toD=s=>{const d=s.substring(0,10).split('-');return new Date(+d[0],+d[1]-1,+d[2],12,0,0)};
  if(ev.c_nota&&ev.c_venc&&ev.c_gr){
    c={nota:toD(ev.c_nota),venc:toD(ev.c_venc),gr:toD(ev.c_gr)};
  }else if(ev.fecha_disparo&&ev.tr_key&&TR[ev.tr_key]){c=calcP(ev.fecha_disparo,ev.tr_key);}
  return{id:ev.id,tipo:'plazo',tr:ev.tr_key,fD:ev.fecha_disparo||ev.fecha,suj:ev.suj||'propio',c};
}
function mapEscFromAPI(w){return{id:w.id,ts:new Date(w.created_at).getTime(),tipo:w.tipo,desc:w.descripcion||'',fechaCargo:w.fecha_presentacion||'',cargo:w.numero_pieza||'Pendiente'};}
const CEDMAP={notificado:'Entregada',no_encontrado:'Persona ausente',devuelta:'Domicilio erróneo',fijada_en_puerta:'Fijada en puerta',pendiente:'Pendiente'};
const CEDREV={'Entregada':'notificado','Fijada en puerta':'fijada_en_puerta','Persona ausente':'no_encontrado','Domicilio erróneo':'devuelta','Pendiente':'pendiente'};
function mapCedFromAPI(c){return{id:c.id,ts:new Date(c.created_at).getTime(),tipo:c.tipo,destinatario:c.destinatario||'',domicilio:c.domicilio||'',fecha:c.fecha_diligenciamiento||c.fecha_envio||'',resultado:CEDMAP[c.resultado]||c.resultado||'Pendiente'};}
function mapConcilFromAPI(k){
  let quien='',notas='';
  if(k.condiciones){const nl=k.condiciones.indexOf('\n');if(nl>-1){quien=k.condiciones.substring(0,nl);notas=k.condiciones.substring(nl+1);}else notas=k.condiciones;}
  return{id:k.id,ts:new Date(k.created_at).getTime(),etapa:k.tipo||'',fecha:k.fecha||'',montoOferta:parseFloat(k.monto_acordado)||0,quien,notas};
}
function mapLogFromAPI(l){return{id:l.id,ts:new Date(l.created_at).getTime(),tipo:l.accion,msg:l.descripcion||'',user:l.usuario||'Sistema'};}
// Async data loading
async function refreshTodos(){
  const[expRes,evRes]=await Promise.all([api('GET','/expedientes?limit=500'),api('GET','/eventos')]);
  S.db=(expRes.expedientes||[]).map(mapExpFromAPI);
  (evRes.eventos||[]).forEach(ev=>{const exp=S.db.find(e=>e.id===ev.expediente_id);if(exp)exp.evs.push(mapEvFromAPI(ev));});
}
async function loadExpDetail(expId){
  const exp=S.db.find(e=>e.id===expId);
  if(!exp||exp._detailLoaded)return;
  try{
    const[escRes,cedRes,concRes,logRes,adjRes]=await Promise.all([
      api('GET',`/escritos/expediente/${expId}`),
      api('GET',`/cedulas/expediente/${expId}`),
      api('GET',`/conciliacion/expediente/${expId}`),
      api('GET',`/historial/expediente/${expId}`),
      api('GET',`/adjuntos/${expId}`)
    ]);
    exp.escritos=(escRes.escritos||[]).map(mapEscFromAPI);
    exp.cedulas=(cedRes.cedulas||[]).map(mapCedFromAPI);
    exp.concil=(concRes.conciliaciones||[]).map(mapConcilFromAPI);
    exp.log=(logRes.historial||[]).map(mapLogFromAPI);
    exp.adjuntos=(adjRes.adjuntos||[]).map(mapAdjFromAPI);
    exp._detailLoaded=true;render();
  }catch(e){console.error('Error cargando detalle:',e);}
}
async function toggleExp(id){
  S.expId=S.expId===id?null:id;render();
  if(S.expId)loadExpDetail(S.expId);
}
function selectHistExp(id){S.hist.expId=id;S.hist.fil='todo';render();loadExpDetail(id);}

function isFeria(d){
  const dd=(d instanceof Date)?d:new Date(d);
  const m=dd.getMonth(), day=dd.getDate();
  // Todo enero (verano)
  if(m===0) return true;
  // 13 al 24 de julio (invierno)
  if(m===6&&day>=13&&day<=24) return true;
  // Días extra configurados por el usuario
  return _feriaExtra.includes(ds(dd));
}

async function doRegister(){
  const r=S.reg;
  if(!r.nombre.trim()||!r.email.trim()||!r.pass.trim()||!r.conf.trim()){r.err='Todos los campos son obligatorios.';render();return;}
  if(r.pass.length<6){r.err='La contraseña debe tener al menos 6 caracteres.';render();return;}
  if(r.pass!==r.conf){r.err='Las contraseñas no coinciden.';render();return;}
  try{
    const res=await api('POST','/auth/register',{nombre:r.nombre.trim(),email:r.email.trim(),password:r.pass});
    setToken(res.token);
    const me=await api('GET','/auth/me');
    S.prof.nombre=me.usuario.nombre;S.prof.email=me.usuario.email;
    S._usuarioRol=me.usuario.rol;S._usuarioId=me.usuario.id;S.logueado=true;S._alertaClosed=false;
    await loadPreferencias();await refreshTodos();initPush();go('panel');checkFirstTimeTour();
  }catch(e){r.err=e.message||'Error al registrarse. Intentá de nuevo.';render();}
}
async function doLogin(){
  if(!S.login.user.trim()||!S.login.pass.trim()){S.login.err='Ingresá usuario y contraseña.';render();return;}
  try{
    const resp=await fetch(API_BASE+'/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:S.login.user,password:S.login.pass})});
    const r=await resp.json();
    if(!resp.ok)throw new Error(r.error||'Credenciales incorrectas');
    setToken(r.token);S.prof.nombre=r.usuario.nombre;S.prof.email=r.usuario.email;
    S._usuarioRol=r.usuario.rol;S._usuarioId=r.usuario.id;S.logueado=true;S.login.err='';S._alertaClosed=false;
    await loadPreferencias();await refreshTodos();initPush();go('panel');checkFirstTimeTour();
  }catch(e){S.login.err=e.message||'Credenciales incorrectas';render();}
}

async function doForgotPw(){
  S.rpw.err='';
  if(!S.rpw.email.trim()){S.rpw.err='Ingres&#xE1; tu email';render();return;}
  try{
    const r=await fetch(API_BASE+'/auth/forgot-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:S.rpw.email.trim()})});
    const data=await r.json();
    if(!r.ok){S.rpw.err=data.error||'Error al generar c&#xF3;digo';render();return;}
    S.rpw.mostrarCodigo=data.codigo||'';
    S.rpw.step=2;
    render();
  }catch(e){S.rpw.err='Error de conexi&#xF3;n';render();}
}
async function doResetPw(){
  S.rpw.err='';
  if(!S.rpw.code.trim()||!S.rpw.pass||!S.rpw.conf){S.rpw.err='Complet&#xE1; todos los campos';render();return;}
  if(S.rpw.pass.length<6){S.rpw.err='La contrase&#xF1;a debe tener al menos 6 caracteres';render();return;}
  if(S.rpw.pass!==S.rpw.conf){S.rpw.err='Las contrase&#xF1;as no coinciden';render();return;}
  try{
    const r=await fetch(API_BASE+'/auth/reset-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:S.rpw.email,codigo:S.rpw.code.trim(),password_nueva:S.rpw.pass})});

    if(!r.ok){S.rpw.err=data.error||'C&#xF3;digo inv&#xE1;lido o expirado';render();return;}
    S.view='login';S.rpw={step:1,email:'',code:'',pass:'',conf:'',err:'',mostrarCodigo:''};
    S.login.err='';toast('Contrase\xF1a actualizada. Pod\xE9s ingresar ahora.');render();
  }catch(e){S.rpw.err='Error de conexi&#xF3;n';render();}
}

let _saving=false;
async function guardarCR(){
  if(_saving)return;
  const cr=S.cr;if(!cr.suj||!cr.tipo||!cr.ref||!cr.fecha)return;
  _saving=true;
  const isA=cr.tipo==='audiencia';
  const body={expediente_id:cr.expId,tipo:cr.tipo,
    descripcion:isA?cr.ref:(TR[cr.ref]?.l||cr.ref),
    fecha:cr.fecha,hora:isA?'10:00:00':null,suj:cr.suj};
  if(!isA){const cp=calcP(cr.fecha,cr.ref);body.tr_key=cr.ref;body.fecha_disparo=cr.fecha;
    body.c_nota=ds(cp.nota);body.c_venc=ds(cp.venc);body.c_gr=ds(cp.gr);}
  try{
    const r=await api('POST','/eventos',body);
    const exp=S.db.find(e=>e.id===cr.expId);if(exp)exp.evs.push(mapEvFromAPI(r.evento));
    S.cr={paso:1,tipo:'',ref:'',fecha:'',suj:'',_cf:'',expId:'',_busqExp:''};
    toast('Evento guardado');go('panel');
  }catch(e){toast('Error: '+e.message);}
  finally{_saving=false;}
}

ex-direction:column;gap:4px;align-items:flex-end"><span style="font-size:10px;color:${reb?cT('red'):dl<=3&&dl>=0?cT('orange'):'var(--tt)'}">${dlb(dl)}</span><button class="btn bdng" onclick="delEv('${exp.id}','${ev.id}')" style="padding:2px 6px"><i class="ti ti-x"></i><span class="ti-fb">✕</span></button></div></div></div>`}).join('')}

async function cambiarEtapa(expId,nueva){
  const exp=S.db.find(e=>e.id===expId);if(!exp)return;
  try{
    await api('PUT',`/expedientes/${expId}`,{numero:exp.cuij,caratula:exp.car,actor:exp.actor,demandado:exp.demandado,
      rol:exp.rol,juzgado:exp.sede,fuero:'Laboral',ciudad:exp.ciudad,tr_nom:exp.trNom,tr_juez:exp.trJuez,
      tr_sec:exp.trSec,tr_email:exp.trEmail,tr_tel:exp.trTel,etapa:nueva,estado:exp.estado,
      notas:exp.notas,monto:exp.monto,monto_acordado:exp.montoAcordado,ibm:exp.ibm,incap:exp.incap,
      cliente:exp.cliente,cliente_tel:exp.clienteTel,folio:exp.folio});
    exp.etapa=nueva;toast('Etapa actualizada');render();
  }catch(e){toast('Error: '+e.message);}
}

function rHist(){
  const h=S.hist;
  if(!h.expId){return`${rHdr()}<span class="sec">Seleccioná un expediente</span>${S.db.map(exp=>{const ll=(exp.log||[]).slice(-1)[0],n=(exp.log||[]).filter(l=>l.tipo==='nota_manual'||l.tipo==='nota_estrategia').length,ec=eCls(exp.etapa),ei=eInfo(exp.etapa);return`<div class="card" style="cursor:pointer" onclick="selectHistExp('${exp.id}')"><div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px"><div style="flex:1;min-width:0"><div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:3px"><span style="font-size:10px;font-family:var(--fm);color:var(--tt)">${exp.cuij}</span><span class="bdg" style="background:${exp.rol==='Actor'?cB('green'):cB('orange')};color:${exp.rol==='Actor'?cT('green'):cT('orange')}">${exp.rol}</span>${ei.v?`<span class="echip" style="background:${ec.bg};color:${ec.tx};border-color:${ec.bd}">${ei.l}</span>`:''}</div><p style="font-size:13px;font-weight:500;margin:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${exp.car}</p><p style="font-size:11px;color:var(--tt);margin:3px 0 0">${(exp.log||[]).length} entradas · ${n} notas${ll?' · '+ago(ll.ts):''}</p></div><i class="ti ti-chevron-right" style="font-size:14px;color:var(--tt);flex-shrink:0;margin-top:3px"></i></div></div>`}).join('')}`}
  const exp=S.db.find(e=>e.id===h.expId);if(!exp){S.hist.expId=null;render();return''}
  // Build unified timeline: log + escritos + cedulas + concil
  const escritosItems=(exp.escritos||[]).map(w=>({
    id:w.id,ts:w.ts,tipo:'escrito',msg:`${w.tipo}${w.desc?' — '+w.desc:''} · Cargo: ${w.cargo}${w.fechaCargo?' ('+fC(new Date(w.fechaCargo+'T12:00:00'))+')':''}`,user:S.prof.nombre||'Usuario',_src:'escrito'
  }));
  const cedulasItems=(exp.cedulas||[]).map(c2=>({
    id:c2.id,ts:c2.ts,tipo:'cedula',msg:`Cédula ${c2.tipo} → ${c2.destinatario||'destinatario'}${c2.domicilio?' ('+c2.domicilio+')':''}: ${c2.resultado}${c2.fecha?' — '+fC(new Date(c2.fecha+'T12:00:00')):''}`,user:S.prof.nombre||'Usuario',_src:'cedula'

async function addNH(expId){
  const ta=document.getElementById('nhi');if(!ta)return;
  const t=ta.value.trim();if(!t)return;
  try{
    const r=await api('POST','/historial',{expediente_id:expId,accion:'nota_manual',descripcion:t});
    const exp=S.db.find(e=>e.id===expId);
    if(exp){if(!exp.log)exp.log=[];exp.log.unshift(mapLogFromAPI({...r.entrada,usuario:S.prof.nombre}));}
    ta.value='';render();
  }catch(e){toast('Error: '+e.message);}
}
async function editarNota(expId,logId){
  const texto=(S.hist._editingLogText||'').trim();
  if(!texto){toast('El texto no puede estar vac\xEDo');return;}
  try{
    const r=await api('PUT','/expedientes/'+expId+'/historial/'+logId,{descripcion:texto});
    const exp=S.db.find(e=>e.id===expId);
    if(exp){const entry=(exp.log||[]).find(l=>l.id===logId);if(entry)entry.msg=r.entrada.descripcion;}
    S.hist._editingLog=null;S.hist._editingLogText='';
    render();toast('Nota actualizada');
  }catch(e){toast('Error: '+e.message);}
}
async function eliminarNota(expId,logId){
  if(!confirm('Eliminar esta nota del historial?\nEsta accion no se puede deshacer.'))return;
  try{
    await api('DELETE','/expedientes/'+expId+'/historial/'+logId);
    const exp=S.db.find(e=>e.id===expId);
    if(exp)exp.log=(exp.log||[]).filter(l=>l.id!==logId);
    render();toast('Nota eliminada');
  }catch(e){toast('Error: '+e.message);}
}

async function cambiarPassword(){
  const {a,n,c}=S.chgPw;
  if(!a||!n||!c){S.chgPw.err='Completá todos los campos';render();return;}
  if(n.length<6){S.chgPw.err='La contraseña nueva debe tener al menos 6 caracteres';render();return;}
  if(n!==c){S.chgPw.err='Las contraseñas nuevas no coinciden';render();return;}
  S.chgPw.err='';
  try{
    await api('PUT','/auth/change-password',{password_actual:a,password_nueva:n});
    S.chgPw={a:'',n:'',c:'',err:'',ok:true};
    render();
  }catch(e){
    S.chgPw.err=e.message||'Error al cambiar contraseña';
    render();
  }
}
async function exportarBackup(){
  const btn=document.getElementById('btn-export-backup');
  if(btn){btn.disabled=true;btn.innerHTML='<i class="ti ti-loader-2"></i> Exportando...';}
  try{
    const data=await api('GET','/backup/export');
    const fecha=new Date().toISOString().slice(0,10).replace(/-/g,'');
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='sgel_backup_'+fecha+'.json';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast('Backup exportado: sgel_backup_'+fecha+'.json');
  }catch(e){console.error('exportarBackup error:',e);toast('Error al exportar: '+e.message);}
  finally{if(btn){btn.disabled=false;btn.innerHTML='<i class="ti ti-download"></i><span class="ti-fb">&#x2193;</span> Exportar backup completo';}}
}
async function importarBackup(input){
  const file=input.files[0];if(!file)return;
  const btn=document.getElementById('btn-import-backup');
  if(btn){btn.disabled=true;btn.innerHTML='<i class="ti ti-loader-2"></i> Importando...';}
  try{
    const text=await file.text();
    const data=JSON.parse(text);
    const r=await api('POST','/backup/import',data);
    S.db.forEach(e=>{delete e._detailLoaded;});
    await refreshTodos();
    const st=r.stats||{};
    toast('Importado: '+( st.expedientes||0)+' exptes, '+(st.eventos||0)+' eventos, '+(st.historial||0)+' notas');
  }catch(e){console.error('importarBackup error:',e);toast('Error al importar: '+e.message);}
  finally{
    input.value='';
    if(btn){btn.disabled=false;btn.innerHTML='<i class="ti ti-upload"></i><span class="ti-fb">&#x2191;</span> Importar backup';}
  }
}

function buildAlertaData(){
  const hoy=new Date();hoy.setHours(0,0,0,0);
  const urgentes=[];  // vencen hoy o mañana
  const proximos=[];  // vencen en 2-7 días
  const cad=cadInst();
  const reb=rebs();
  const a51=art51Pend();

  // Eventos próximos
  aEvs(-0,7).forEach(x=>{
    const item={car:x.exp.car,cuij:x.exp.cuij,desc:x.ev.tipo==='audiencia'?x.ev.desc:TR[x.ev.tr]?.l,fecha:x.date,dl:x.dl,color:x.color,suj:x.ev.suj||''};
    if(x.dl<=1) urgentes.push(item);
    else proximos.push(item);
  });

  return{urgentes,proximos,cad,reb,a51};
}

async function guardarEscrito(){
  const m=S._modalEscrito;if(!m||!m.tipo)return;
  try{
    const r=await api('POST','/escritos',{expediente_id:m.expId,tipo:m.tipo,descripcion:m.desc||'',
      fecha_presentacion:m.fechaCargo||null,numero_pieza:m.cargo||'Pendiente'});
    const exp=S.db.find(e=>e.id===m.expId);
    if(exp){if(!exp.escritos)exp.escritos=[];exp.escritos.unshift(mapEscFromAPI(r.escrito));}
    S._modalEscrito=null;toast('Escrito registrado');render();
  }catch(e){toast('Error: '+e.message);}
}

async function guardarCedula(){
  const m=S._modalCedula;if(!m||!m.tipo)return;
  const resultado=CEDREV[m.resultado]||'pendiente';
  try{
    const r=await api('POST','/cedulas',{expediente_id:m.expId,tipo:m.tipo,
      destinatario:m.destinatario||'',domicilio:m.domicilio||'',
      fecha_diligenciamiento:m.fecha||null,resultado});
    const exp=S.db.find(e=>e.id===m.expId);
    if(exp){if(!exp.cedulas)exp.cedulas=[];exp.cedulas.unshift(mapCedFromAPI(r.cedula));}
    S._modalCedula=null;toast('Cédula registrada');render();
  }catch(e){toast('Error: '+e.message);}
}

async function delEscrito(expId,id){

async function delCedula(expId,id){

    </table>`;
  } else {
    body=`<h1>Reporte Mensual — ${MES2[m]} ${a}</h1><p style="color:#666;margin-bottom:8px">Estudio: ${S.prof.nombre||''}</p>
    <div style="display:flex;gap:16px;margin-bottom:16px">
      <div style="background:#f0fdf4;padding:10px 14px;border-radius:8px;flex:1;text-align:center"><p style="font-size:10px;color:#475569;margin:0">Días hábiles</p><p style="font-size:24px;font-weight:700;margin:0;color:#16a34a">${cJD(m,a)}</p></div>
      <div style="background:#eff6ff;padding:10px 14px;border-radius:8px;flex:1;text-align:center"><p style="font-size:10px;color:#475569;margin:0">Total eventos</p><p style="font-size:24px;font-weight:700;margin:0;color:#1d4ed8">${evsM.length}</p></div>
      <div style="background:#fff1f2;padding:10px 14px;border-radius:8px;flex:1;text-align:center"><p style="font-size:10px;color:#475569;margin:0">Vencidos</p><p style="font-size:24px;font-weight:700;margin:0;color:#dc2626">${evsM.filter(x=>x.dl<0&&x.color==='orange').length}</p></div>
    </div>
    <table style="width:100%;border-collapse:collapse;font-size:12px">
      <thead><tr style="background:#1d4ed8;color:#fff"><th style="padding:6px 10px;text-align:left">Fecha</th><th style="padding:6px 10px;text-align:left">Tipo</th><th style="padding:6px 10px;text-align:left">Acto</th><th style="padding:6px 10px;text-align:left">Expediente</th></tr></thead>
      <tbody>${evsM.map((x,i)=>`<tr style="background:${i%2===0?'#f8fafc':'#fff'}"><td style="padding:6px 10px;border-bottom:1px solid #e2e8f0">${fC(x.date)}</td><td style="padding:6px 10px;border-bottom:1px solid #e2e8f0">${{green:'Audiencia',orange:'Vencimiento',blue:'Vigilancia'}[x.color]||''}</td><td style="padding:6px 10px;border-bottom:1px solid #e2e8f0">${x.ev.tipo==='audiencia'?x.ev.desc:TR[x.ev.tr]?.l}</td><td style="padding:6px 10px;border-bottom:1px solid #e2e8f0;font-size:11px">${x.exp.car}</td></tr>`).join('')}</tbody>
    </table>`;
  }
  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>SGEL — ${tipo==='agenda'?'Agenda':'Reporte'}</title><style>body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;padding:24px;color:#0f172a}h1{font-size:20px;margin:0 0 4px}@media print{@page{margin:1.5cm}}</style></head><body>${body}<p style="margin-top:20px;font-size:10px;color:#94a3b8">SGEL Guardián Procesal · ${fC(HOY)}</p></body></html>`;
  const w=window.open('','_blank');w.document.write(html);w.document.close();setTimeout(()=>w.print(),400);
}

// ── EXPORTAR EXPEDIENTE COMPLETO ─────────────────────────────────────────
function exportExpediente(expId, formato) {
  const exp = S.db.find(e => e.id === expId);
  if (!exp) return;

  // Collect all activity sorted chronologically
  const escritos = (exp.escritos || []).map(w => ({ts: w.ts, tipo: 'escrito', data: w}));
  const cedulas  = (exp.cedulas  || []).map(c => ({ts: c.ts, tipo: 'cedula',  data: c}));
  const concil   = (exp.concil   || []).map(k => ({ts: k.ts, tipo: 'concil',  data: k}));
  const logItems = (exp.log      || []).map(l => ({ts: l.ts, tipo: 'log',     data: l}));
  const todo = [...escritos, ...cedulas, ...concil, ...logItems].sort((a,b) => a.ts - b.ts);

  const proxEvs = aEvs(-365, 365).filter(x => x.exp.id === expId);

  if (formato === 'pdf') {
    _exportExpPDF(exp, todo, proxEvs);
  } else {
    _exportExpTXT(exp, todo, proxEvs);
  }
}

function _exportExpTXT(exp, todo, proxEvs) {
  const sep  = '─'.repeat(60);
  const sep2 = '═'.repeat(60);
  let t = '';

  t += `SGEL — GUARDIÁN PROCESAL · SANTA FE\n`;
  t += `Generado: ${fC(HOY)} · ${S.prof.nombre || ''}\n`;
  t += sep2 + '\n\n';

  // Encabezado
  t += `EXPEDIENTE\n${sep}\n`;
  t += `CUIJ:       ${exp.cuij}\n`;
  t += `Carátula:   ${exp.car}\n`;
  t += `Rol:        ${exp.rol}\n`;
  t += `Sede:       ${exp.sede}\n`;
  if (exp.ciudad)  t += `Ciudad:     ${exp.ciudad}\n`;
  if (exp.trJuez)  t += `Juzgado:    ${exp.trNom} — ${exp.trJuez}\n`;
  if (exp.trSec)   t += `Secretaría: ${exp.trSec}\n`;
  if (exp.trEmail) t += `Email:      ${exp.trEmail}\n`;
  if (exp.trTel)   t += `Tel:        ${exp.trTel}\n`;
  if (exp.etapa)   t += `Etapa:      ${eInfo(exp.etapa).l}\n`;
  if (exp.cliente) t += `Cliente:    ${exp.cliente}${exp.clienteTel ? ' · ' + exp.clienteTel : ''}\n`;
  if (exp.folio)   t += `Folio:      ${exp.folio}\n`;
  if (exp.monto)   t += `Monto rec.: $${Number(exp.monto).toLocaleString('es-AR', {minimumFractionDigits: 2})}\n`;
  if (exp.montoAcordado) t += `Monto ac.:  $${Number(exp.montoAcordado).toLocaleString('es-AR', {minimumFractionDigits: 2})}\n`;
  if (exp.notas)   t += `Notas:      ${exp.notas}\n`;
  t += '\n';

  // Eventos próximos
  if (proxEvs.length) {
    t += `AGENDA DE EVENTOS\n${sep}\n`;
    proxEvs.forEach(x => {
      const tipo = x.ev.tipo === 'audiencia' ? 'Audiencia' : TR[x.ev.tr]?.l;
      const estado = x.dl < 0 ? `(venció hace ${Math.abs(x.dl)}d)` : x.dl === 0 ? '(HOY)' : x.dl === 1 ? '(mañana)' : `(en ${x.dl}d)`;
      t += `${fC(x.date)}  ${tipo}  ${estado}\n`;
      if (x.ev.tipo === 'plazo' && x.ev.suj === 'propio') {
        t += `           Nota: ${fC(x.ev.c.nota)} · Gracia: ${fC(x.ev.c.gr)} 09:00\n`;
      }
    });
    t += '\n';
  }

  // Escritos
  if (exp.escritos && exp.escritos.length) {
    t += `ESCRITOS PRESENTADOS\n${sep}\n`;
    exp.escritos.forEach(w => {
      t += `${w.fechaCargo ? fC(new Date(w.fechaCargo + 'T12:00:00')) : '—'}  ${w.tipo}`;
      if (w.desc) t += `  —  ${w.desc}`;
      t += `  [${w.cargo}]\n`;
    });
    t += '\n';
  }

  // Cédulas
  if (exp.cedulas && exp.cedulas.length) {
    t += `CÉDULAS\n${sep}\n`;
    exp.cedulas.forEach(c => {
      t += `${c.fecha ? fC(new Date(c.fecha + 'T12:00:00')) : '—'}  ${c.tipo}`;
      if (c.destinatario) t += `  →  ${c.destinatario}`;
      if (c.domicilio)    t += ` (${c.domicilio})`;
      t += `  [${c.resultado}]\n`;
    });
    t += '\n';
  }

  // Conciliación
  if (exp.concil && exp.concil.length) {
    t += `CONCILIACIÓN\n${sep}\n`;
    exp.concil.forEach(k => {
      t += `${k.fecha ? fC(new Date(k.fecha + 'T12:00:00')) : '—'}  ${k.etapa}`;
      if (k.montoOferta) t += `  $${k.montoOferta.toLocaleString('es-AR')} (${k.quien})`;
      if (k.notas) t += `  —  ${k.notas}`;
      t += '\n';
    });
    t += '\n';
  }

  // Historial completo
  t += `HISTORIAL DE ACTIVIDAD\n${sep}\n`;
  todo.forEach(item => {
    const fecha = fT(item.ts);
    if (item.tipo === 'log') {
      const l = item.data;
      t += `${fecha}  [${(LC[l.tipo] || LC.nota_manual).lb}]  ${l.msg}`;
      t += l.user !== 'Sistema' ? `  (${l.user})` : '  (Sistema)';
      t += '\n';
    } else if (item.tipo === 'escrito') {
      const w = item.data;
      t += `${fecha}  [Escrito]  ${w.tipo}${w.desc ? ' — ' + w.desc : ''}  [${w.cargo}]\n`;
    } else if (item.tipo === 'cedula') {
      const c = item.data;
      t += `${fecha}  [Cédula]  ${c.tipo} → ${c.destinatario || '—'}  [${c.resultado}]\n`;
    } else if (item.tipo === 'concil') {
      const k = item.data;
      t += `${fecha}  [Conciliación]  ${k.etapa}${k.montoOferta ? ' $' + k.montoOferta.toLocaleString('es-AR') : ''}\n`;
    }
  });

  t += '\n' + sep2 + '\nSGEL Guardián Procesal · Santa Fe';

  const fn = `sgel_${exp.cuij.replace(/[^0-9]/g,'-')}.txt`;
  const a = document.createElement('a');
  a.href = 'data:text/plain;charset=utf-8,' + encodeURIComponent(t);
  a.download = fn;
  a.click();
  toast('Expediente exportado como .txt');
}

function _exportExpPDF(exp, todo, proxEvs) {
  const escritos = exp.escritos || [];
  const cedulas  = exp.cedulas  || [];
  const concil   = exp.concil   || [];

  const tblRow = (cells, bg) =>
    `<tr style="background:${bg}">${cells.map(c =>
      `<td style="padding:5px 9px;border-bottom:1px solid #e2e8f0;font-size:11px;vertical-align:top">${c}</td>`
    ).join('')}</tr>`;

  const tblHead = cells =>
    `<tr style="background:#1d4ed8;color:#fff">${cells.map(c =>
      `<th style="padding:6px 9px;text-align:left;font-size:11px;font-weight:600">${c}</th>`
    ).join('')}</tr>`;

  const section = (title, content) =>
    `<div style="margin-bottom:20px">
      <h2 style="font-size:13px;font-weight:700;color:#1d4ed8;border-bottom:2px solid #1d4ed8;padding-bottom:4px;margin:0 0 10px">${title}</h2>
      ${content}
    </div>`;

  const badge = (txt, color) =>
    `<span style="background:${color}15;color:${color};padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600;border:1px solid ${color}40">${txt}</span>`;

  // Encabezado
  let body = `
  <div style="background:#1d4ed8;color:#fff;padding:16px 20px;border-radius:8px;margin-bottom:20px">
    <p style="font-size:10px;margin:0 0 2px;opacity:.75;letter-spacing:.08em">SGEL · GUARDIÁN PROCESAL · SANTA FE</p>
    <h1 style="font-size:16px;font-weight:700;margin:0 0 6px">${exp.car}</h1>
    <div style="display:flex;gap:12px;flex-wrap:wrap;font-size:11px;opacity:.9">
      <span><strong>CUIJ:</strong> ${exp.cuij}</span>
      <span><strong>Rol:</strong> ${exp.rol}</span>
      ${exp.etapa ? `<span><strong>Etapa:</strong> ${eInfo(exp.etapa).l}</span>` : ''}
    </div>
  </div>`;

  // Datos del juzgado + cliente
  const datosRows = [];
  if (exp.ciudad)  datosRows.push(['Ciudad / Sede', exp.ciudad]);
  if (exp.trJuez)  datosRows.push(['Juzgado', `${exp.trNom} — ${exp.trJuez}`]);
  if (exp.trSec)   datosRows.push(['Secretaría', exp.trSec]);
  if (exp.trEmail) datosRows.push(['Email tribunal', `<a href="mailto:${exp.trEmail}" style="color:#1d4ed8">${exp.trEmail}</a>`]);
  if (exp.trTel)   datosRows.push(['Teléfono', exp.trTel]);
  if (exp.cliente) datosRows.push(['Cliente', `${exp.cliente}${exp.clienteTel ? ' · ' + exp.clienteTel : ''}`]);
  if (exp.folio)   datosRows.push(['Folio / Legajo', exp.folio]);
  if (exp.monto)   datosRows.push(['Monto reclamado', `<strong>$${Number(exp.monto).toLocaleString('es-AR', {minimumFractionDigits:2})}</strong>`]);
  if (exp.montoAcordado) datosRows.push(['Monto acordado', `<strong style="color:#16a34a">$${Number(exp.montoAcordado).toLocaleString('es-AR', {minimumFractionDigits:2})}</strong>`]);
  if (exp.notas)   datosRows.push(['Notas internas', `<em style="color:#475569">${exp.notas}</em>`]);

  if (datosRows.length) {
    body += section('Datos del Expediente',
      `<table style="width:100%;border-collapse:collapse">
        ${datosRows.map(([k,v],i) =>
          tblRow([`<strong style="color:#475569">${k}</strong>`, v], i%2===0?'#f8fafc':'#fff')
        ).join('')}
      </table>`
    );
  }

  // Agenda de eventos
  if (proxEvs.length) {
    const filas = proxEvs.map((x,i) => {
      const tipo  = x.ev.tipo === 'audiencia' ? x.ev.desc : TR[x.ev.tr]?.l;
      const clase = x.color === 'green' ? '#16a34a' : x.color === 'orange' ? '#b45309' : '#1d4ed8';
      const dlTxt = x.dl < 0 ? `Venció hace ${Math.abs(x.dl)}d` : x.dl === 0 ? 'HOY' : x.dl === 1 ? 'Mañana' : `En ${x.dl}d`;
      return tblRow([fC(x.date), tipo, badge(dlTxt, clase), x.ev.suj === 'contraparte' ? 'Contraparte' : 'Propio'], i%2===0?'#f8fafc':'#fff');
    }).join('');
    body += section('Agenda de Eventos',
      `<table style="width:100%;border-collapse:collapse">
        ${tblHead(['Fecha','Acto procesal','Estado','Sujeto'])}${filas}
      </table>`
    );
  }

  // Escritos
  if (escritos.length) {
    const filas = escritos.map((w,i) => {
      const col = w.cargo === 'Obtenido' ? '#16a34a' : w.cargo === 'Rechazado' ? '#dc2626' : '#b45309';
      return tblRow([w.fechaCargo ? fC(new Date(w.fechaCargo+'T12:00:00')) : '—', w.tipo, w.desc||'—', badge(w.cargo, col)], i%2===0?'#f8fafc':'#fff');
    }).join('');
    body += section('Escritos Presentados',
      `<table style="width:100%;border-collapse:collapse">
        ${tblHead(['Fecha cargo','Tipo','Descripción','Estado'])}${filas}
      </table>`
    );
  }

  // Cédulas
  if (cedulas.length) {
    const filas = cedulas.map((c,i) => {
      const col = c.resultado === 'Entregada' ? '#16a34a' : c.resultado === 'Fijada en puerta' ? '#b45309' : '#94a3b8';
      return tblRow([c.fecha ? fC(new Date(c.fecha+'T12:00:00')) : '—', c.tipo, c.destinatario||'—', c.domicilio||'—', badge(c.resultado, col)], i%2===0?'#f8fafc':'#fff');
    }).join('');
    body += section('Cédulas',
      `<table style="width:100%;border-collapse:collapse">
        ${tblHead(['Fecha','Tipo','Destinatario','Domicilio','Resultado'])}${filas}
      </table>`
    );
  }

  // Conciliación
  if (concil.length) {
    const filas = concil.map((k,i) => {
      const col = k.etapa === 'Homologado' ? '#16a34a' : k.etapa === 'Rechazado' ? '#dc2626' : '#1d4ed8';
      return tblRow([k.fecha ? fC(new Date(k.fecha+'T12:00:00')) : '—', badge(k.etapa, col), k.montoOferta ? '$'+k.montoOferta.toLocaleString('es-AR') : '—', k.quien||'—', k.notas||'—'], i%2===0?'#f8fafc':'#fff');
    }).join('');
    body += section('Conciliación',
      `<table style="width:100%;border-collapse:collapse">
        ${tblHead(['Fecha','Etapa','Monto','Quién','Notas'])}${filas}
      </table>`
    );
  }

  // Historial
  const logRows = todo.slice(-30).map((item,i) => { // últimas 30 entradas
    let lb='', msg='', usr='';
    if(item.tipo==='log'){const l=item.data;lb=(LC[l.tipo]||LC.nota_manual).lb;msg=l.msg;usr=l.user;}
    else if(item.tipo==='escrito'){lb='Escrito';msg=`${item.data.tipo}${item.data.desc?' — '+item.data.desc:''}`;usr='Usuario';}
    else if(item.tipo==='cedula'){lb='Cédula';msg=`${item.data.tipo} → ${item.data.destinatario||'—'} [${item.data.resultado}]`;usr='Usuario';}
    else if(item.tipo==='concil'){lb='Conciliación';msg=`${item.data.etapa}${item.data.montoOferta?' $'+item.data.montoOferta.toLocaleString('es-AR'):''}`;usr='Usuario';}
    return tblRow([fT(item.ts), `<em>${lb}</em>`, msg, usr==='Sistema'?'<em style="color:#94a3b8">Sistema</em>':usr], i%2===0?'#f8fafc':'#fff');
  }).join('');

  body += section('Historial de Actividad (últimas 30 entradas)',
    `<table style="width:100%;border-collapse:collapse">
      ${tblHead(['Fecha y hora','Tipo','Detalle','Usuario'])}${logRows}
    </table>`
  );

  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
  <title>SGEL — ${exp.car}</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:24px 28px;color:#0f172a;max-width:900px;margin:0 auto}
    @media print{@page{margin:1.5cm;size:A4}body{padding:0}h2{break-before:avoid}table{break-inside:avoid}}
  </style>
  </head><body>${body}
  <p style="margin-top:24px;font-size:10px;color:#94a3b8;border-top:1px solid #e2e8f0;padding-top:8px">
    SGEL Guardián Procesal · ${fC(HOY)} · ${S.prof.nombre || ''}
  </p>
  </body></html>`;

  const w = window.open('', '_blank');
  w.document.write(html);
  w.document.close();
  setTimeout(() => w.print(), 500);
  toast('PDF listo para imprimir / guardar');
}

// ── BÚSQUEDA GLOBAL ──────────────────────────────────────────────────────
function rBusqGlobal(){
  const q=(S._gq||'').toLowerCase().trim();
  const res=q.length<2?[]:S.db.filter(exp=>{
    return (
      exp.car.toLowerCase().includes(q)||
      exp.cuij.toLowerCase().includes(q)||
      (exp.cliente||'').toLowerCase().includes(q)||
      (exp.trJuez||'').toLowerCase().includes(q)||
      (exp.trSec||'').toLowerCase().includes(q)||
      (exp.folio||'').toLowerCase().includes(q)||
      (exp.notas||'').toLowerCase().includes(q)||
      (exp.ciudad||'').toLowerCase().includes(q)||
      (exp.evs||[]).some(ev=>ev.tipo==='audiencia'&&ev.desc.toLowerCase().includes(q))||
      (exp.escritos||[]).some(w=>(w.tipo+' '+w.desc).toLowerCase().includes(q))||
      (exp.log||[]).some(l=>l.msg.toLowerCase().includes(q))
    );
  });
  function hl(txt){
    if(!q||!txt)return txt||'';
    return txt.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),m=>`<mark style="background:#fde68a;border-radius:2px;padding:0 1px">${m}</mark>`);
  }
  return`${rHdr()}
  <div style="margin-bottom:1rem">
    <p style="font-size:9px;font-family:var(--fm);color:var(--tt);margin:0 0 3px;letter-spacing:.1em">BÚSQUEDA GLOBAL</p>
    <h2 style="font-size:18px;font-weight:600;margin:0 0 .875rem">Buscar en todos los expedientes</h2>
    <div style="position:relative">
      <i class="ti ti-search" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--tt)"></i>
      <input class="inp" type="text" placeholder="Carátula, CUIJ, cliente, juez, folio, notas..." 
        style="padding-left:42px;font-size:15px;height:48px;border-radius:10px" 
        value="${S._gq||''}" 
        data-sid="gq" oninput="S._gq=this.value;render()" 
        autofocus>
      ${S._gq?`<button onclick="S._gq='';render()" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--tt);font-size:18px"><i class="ti ti-x"></i><span class="ti-fb">✕</span></button>`:''}
    </div>
    ${q.length>0&&q.length<2?`<p style="font-size:12px;color:var(--tt);margin-top:6px">Escribí al menos 2 caracteres para buscar</p>`:''}
  </div>
  ${q.length>=2?`
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
    <span class="sec" style="margin:0">${res.length} resultado${res.length!==1?'s':''} para "${S._gq}"</span>
  </div>
  ${res.length===0?`<div class="rbox" style="text-align:center;padding:2.5rem">
    <i class="ti ti-search-off" style="font-size:32px;color:var(--tt)"></i>
    <p style="color:var(--ts);margin-top:10px;font-weight:500">Sin resultados para "${S._gq}"</p>
    <p style="color:var(--tt);font-size:12px;margin-top:4px">Probá con CUIJ, nombre del cliente o juez</p>
  </div>`:''}
  ${res.map(exp=>{

// ── ESTADÍSTICAS DEL ESTUDIO ─────────────────────────────────────────────
function rStats(){
  const db=S.db;
  if(!db.length) return`${rHdr()}<div class="rbox" style="text-align:center;padding:3rem"><i class="ti ti-chart-bar" style="font-size:32px;color:var(--tt)"></i><p style="color:var(--ts);margin-top:10px">Sin expedientes para mostrar estadísticas</p></div>`;

  // Por etapa
  const porEtapa=ETAPAS.filter(e=>e.v).map(et=>{
    const cnt=db.filter(e=>e.etapa===et.v).length;
    return{...et,cnt};
  }).filter(e=>e.cnt>0);

  // Por rol
  const actores=db.filter(e=>e.rol==='Actor').length;
  const demandados=db.filter(e=>e.rol==='Demandado').length;

  // Por ciudad
  const porCiudad={};
  db.forEach(e=>{const k=e.ciudad||e.sede||'Sin asignar';porCiudad[k]=(porCiudad[k]||0)+1;});
  const ciudadList=Object.entries(porCiudad).sort((a,b)=>b[1]-a[1]).slice(0,8);

  // Actividad total
  const totalEscritos=db.reduce((a,e)=>a+(e.escritos||[]).length,0);
  const totalCedulas=db.reduce((a,e)=>a+(e.cedulas||[]).length,0);
  const totalEventos=db.reduce((a,e)=>a+(e.evs||[]).length,0);
  const totalConcil=db.reduce((a,e)=>a+(e.concil||[]).length,0);
  const montoTotal=db.reduce((a,e)=>a+(parseFloat(e.monto)||0),0);
  const montoAcordado=db.reduce((a,e)=>a+(parseFloat(e.montoAcordado)||0),0);
  const conCliente=db.filter(e=>e.cliente).length;
  const sinAsignar=db.filter(e=>!e.etapa).length;
  const enRiesgo=cadInst().length;

  // Bar helper
  const maxBar=Math.max(...porEtapa.map(e=>e.cnt),1);
  function bar(v,color,max){const p=Math.round((v/max)*100);return`<div style="flex:1;height:10px;border-radius:5px;background:var(--bs)"><div style="width:${p}%;height:10px;border-radius:5px;background:${color}"></div></div>`;}

  return`${rHdr()}
  <p style="font-size:9px;font-family:var(--fm);color:var(--tt);margin:0 0 3px;letter-spacing:.1em">ESTADÍSTICAS</p>
  <h2 style="font-size:18px;font-weight:600;margin:0 0 1rem">Estado del estudio</h2>

  <div class="g4" style="margin-bottom:1rem">
    <div class="mc"><p style="font-size:11px;color:var(--ts);margin:0 0 2px">Expedientes</p><p style="font-size:28px;font-weight:700;margin:0">${db.length}</p></div>
    <div class="mc"><p style="font-size:11px;color:var(--ts);margin:0 0 2px">Actores</p><p style="font-size:28px;font-weight:700;margin:0;color:var(--gs)">${actores}</p></div>
    <div class="mc"><p style="font-size:11px;color:var(--ts);margin:0 0 2px">Demandados</p><p style="font-size:28px;font-weight:700;margin:0;color:var(--ws)">${demandados}</p></div>
    <div class="mc"><p style="font-size:11px;color:var(--ts);margin:0 0 2px">En riesgo</p><p style="font-size:28px;font-weight:700;margin:0;color:${enRiesgo?'var(--ds)':'var(--tp)'}">${enRiesgo}</p><p style="font-size:10px;color:var(--tt);margin:0">caducidad</p></div>
  </div>

  <div class="g2" style="margin-bottom:1rem">
    <div class="card" style="padding:.875rem">
      <span class="sec">Por etapa procesal</span>
      ${porEtapa.length?porEtapa.map(et=>{const ec=eCls(et.v);return`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <span style="font-size:11px;color:${ec.tx};min-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${et.l}</span>
        ${bar(et.cnt,'var(--is)',maxBar)}
        <span style="font-size:12px;font-weight:600;min-width:20px;text-align:right">${et.cnt}</span>
      </div>`;}).join(''):`<p style="font-size:12px;color:var(--tt)">Sin datos de etapa</p>`}
      ${sinAsignar?`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="font-size:11px;color:var(--tt);min-width:120px">Sin asignar</span>${bar(sinAsignar,'var(--bt)',maxBar)}<span style="font-size:12px;font-weight:600;min-width:20px;text-align:right">${sinAsignar}</span></div>`:''}
    </div>
    <div class="card" style="padding:.875rem">
      <span class="sec">Por ciudad / sede</span>
      ${ciudadList.map(([ciudad,cnt],i)=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <span style="font-size:11px;color:var(--ts);min-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ciudad}</span>
        ${bar(cnt,'var(--ps)',ciudadList[0][1])}
        <span style="font-size:12px;font-weight:600;min-width:20px;text-align:right">${cnt}</span>
      </div>`).join('')}
    </div>
  </div>

  <div class="card" style="margin-bottom:1rem">
    <span class="sec">Actividad registrada</span>
    <div class="g4">
      <div class="mc"><p style="font-size:11px;color:var(--ts);margin:0 0 2px">Eventos</p><p style="font-size:22px;font-weight:600;margin:0">${totalEventos}</p></div>
      <div class="mc"><p style="font-size:11px;color:var(--ts);margin:0 0 2px">Escritos</p><p style="font-size:22px;font-weight:600;margin:0;color:var(--is)">${totalEscritos}</p></div>
      <div class="mc"><p style="font-size:11px;color:var(--ts);margin:0 0 2px">Cédulas</p><p style="font-size:22px;font-weight:600;margin:0;color:var(--ps)">${totalCedulas}</p></div>
      <div class="mc"><p style="font-size:11px;color:var(--ts);margin:0 0 2px">Conciliaciones</p><p style="font-size:22px;font-weight:600;margin:0;color:var(--gs)">${totalConcil}</p></div>
    </div>
  </div>

  ${montoTotal>0?`<div class="card" style="margin-bottom:1rem">
    <span class="sec">Montos</span>
    <div class="g2">
      <div class="mc"><p style="font-size:11px;color:var(--ts);margin:0 0 2px">Total reclamado</p><p style="font-size:18px;font-weight:700;margin:0;color:var(--is)">$${montoTotal.toLocaleString('es-AR',{minimumFractionDigits:2})}</p><p style="font-size:10px;color:var(--tt);margin:0">${db.filter(e=>e.monto).length} exptes.</p></div>
      ${montoAcordado?`<div class="mc"><p style="font-size:11px;color:var(--ts);margin:0 0 2px">Total acordado</p><p style="font-size:18px;font-weight:700;margin:0;color:var(--gs)">$${montoAcordado.toLocaleString('es-AR',{minimumFractionDigits:2})}</p><p style="font-size:10px;color:var(--tt);margin:0">${db.filter(e=>e.montoAcordado).length} exptes.</p></div>`:''}
    </div>
  </div>`:''}

  <div class="card">
    <span class="sec">Cobertura de datos</span>
    ${[
      ['Con cliente registrado', conCliente, db.length, 'var(--is)'],
      ['Con tribunal asignado', db.filter(e=>e.trJuez).length, db.length, 'var(--ps)'],
      ['Con etapa asignada', db.filter(e=>e.etapa).length, db.length, 'var(--gs)'],
      ['Con monto reclamado', db.filter(e=>e.monto).length, db.length, 'var(--ws)'],
    ].map(([label,n,total,color])=>{
      const pct=total?Math.round((n/total)*100):0;
      return`<div style="margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;margin-bottom:3px">
          <span style="font-size:12px;color:var(--ts)">${label}</span>
          <span style="font-size:12px;font-weight:600">${n}/${total} (${pct}%)</span>
        </div>
        <div style="height:6px;border-radius:3px;background:var(--bs)">
          <div style="width:${pct}%;height:6px;border-radius:3px;background:${color}"></div>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

async function duplicarExp(expId){
  const src=S.db.find(e=>e.id===expId);if(!src)return;
  if(!confirm(`¿Duplicar "${src.car.substring(0,50)}..."?\nSe copiará la info básica sin eventos ni historial.`))return;
  const body={numero:'',caratula:src.car+' (copia)',actor:src.actor||'',demandado:src.demandado||'',
    rol:src.rol,juzgado:src.sede,fuero:'Laboral',ciudad:src.ciudad||'',
    tr_nom:src.trNom||'',tr_juez:src.trJuez||'',tr_sec:src.trSec||'',
    tr_email:src.trEmail||'',tr_tel:src.trTel||'',etapa:'',estado:'activo',
    notas:src.notas||'',monto:src.monto||null,monto_acordado:null,
    ibm:src.ibm||0,incap:src.incap||0,
    cliente:src.cliente||'',cliente_tel:src.clienteTel||'',folio:''};
  try{
    const r=await api('POST','/expedientes',body);
    const exp=mapExpFromAPI(r.expediente);exp._detailLoaded=true;
    S.db.unshift(exp);toast('Expediente duplicado — actualizá el CUIJ');
    S.expId=exp.id;go('expedientes');
  }catch(e){toast('Error: '+e.message);}
}

async function loadUsuarios(){
  try{
    const r=await api('GET','/usuarios');
    S._adu.list=r.usuarios||[];S._adu.loaded=true;S._adu.sel=null;render();
  }catch(e){toast('Error al cargar usuarios: '+e.message);}
}
async function crearUsuario(){
  const n=S._adu.nuevo;n.err='';
  if(!n.nombre.trim()||!n.email.trim()||!n.pass){n.err='Complet&#xE1; todos los campos';render();return;}
  if(n.pass.length<6){n.err='Contrase&#xF1;a m&#xED;nimo 6 caracteres';render();return;}
  try{
    const r=await api('POST','/usuarios',{nombre:n.nombre.trim(),email:n.email.trim(),password:n.pass,rol:n.rol});
    S._adu.list.push(r.usuario);S._adu.form=false;S._adu.nuevo={nombre:'',email:'',pass:'',rol:'abogado',err:''};
    render();toast('Usuario creado');
  }catch(e){n.err=e.message||'Error al crear usuario';render();}
}
async function toggleActivoUsuario(id,nuevoEstado){
  try{
    const r=await api('PATCH','/usuarios/'+id,{activo:nuevoEstado});
    const u=S._adu.list.find(x=>x.id===id);if(u){u.activo=r.usuario.activo;}
    render();toast(nuevoEstado?'Usuario activado':'Usuario desactivado');
  }catch(e){toast('Error: '+e.message);}
}
async function cambiarRolUsuario(id,rol){
  try{
    const r=await api('PATCH','/usuarios/'+id,{rol});
    const u=S._adu.list.find(x=>x.id===id);if(u){u.rol=r.usuario.rol;}
    render();toast('Rol actualizado');
  }catch(e){toast('Error: '+e.message);}
}
async function eliminarUsuario(id){
  if(!confirm('Eliminar permanentemente este usuario?\nEsta accion no se puede deshacer.'))return;
  try{
    await api('DELETE','/usuarios/'+id);
    S._adu.list=S._adu.list.filter(x=>x.id!==id);S._adu.sel=null;
    render();toast('Usuario eliminado');
  }catch(e){toast('Error: '+e.message);}
}

// ── WEB PUSH ─────────────────────────────────────────────────────────────
function urlB64ToUint8(b){const p='='.repeat((4-b.length%4)%4);const s=(b+p).replace(/-/g,'+').replace(/_/g,'/');const r=atob(s);return Uint8Array.from([...r].map(c=>c.charCodeAt(0)));}
async function initPush(){
  if(!('serviceWorker' in navigator&&'PushManager' in window)){S._pushState='unsupported';return;}
  try{
    const reg=await navigator.serviceWorker.register('./sw.js');
    const sub=await reg.pushManager.getSubscription();
    if(sub){S._pushSub=sub;S._pushState='subscribed';}
    else S._pushState=Notification.permission==='denied'?'denied':'idle';
  }catch(e){console.error('[push] initPush:',e);S._pushState='unsupported';}
  render();
}
async function suscribirPush(){
  if(VAPID_PUBLIC_KEY==='YOUR_VAPID_PUBLIC_KEY'){toast('Configurar VAPID_PUBLIC_KEY primero');return;}
  S._pushState='loading';render();
  try{
    const perm=await Notification.requestPermission();
    if(perm!=='granted'){S._pushState='denied';render();return;}
    const reg=await navigator.serviceWorker.ready;
    const sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlB64ToUint8(VAPID_PUBLIC_KEY)});
    const j=sub.toJSON();
    await api('POST','/notificaciones/suscribir',{endpoint:j.endpoint,p256dh:j.keys.p256dh,auth:j.keys.auth});
    S._pushSub=sub;S._pushState='subscribed';render();toast('Notificaciones push activadas');
  }catch(e){console.error('[push] suscribirPush:',e);S._pushState='idle';render();toast('Error: '+e.message);}
}
async function desuscribirPush(){
  try{
    if(S._pushSub){const j=S._pushSub.toJSON();await api('DELETE','/notificaciones/suscribir',{endpoint:j.endpoint});await S._pushSub.unsubscribe();S._pushSub=null;}
    S._pushState='idle';render();toast('Notificaciones push desactivadas');
  }catch(e){toast('Error: '+e.message);}
}
function rPushUI(){
  if(!('serviceWorker' in navigator&&'PushManager' in window))
    return`<p style="font-size:12px;color:var(--tt);margin:0">Tu navegador no soporta notificaciones push.</p>`;
  const st=S._pushState||'idle';
  if(st==='unsupported')return`<p style="font-size:12px;color:var(--tt);margin:0">No soportado en este navegador.</p>`;
  if(st==='loading')return`<div class="rr"><span style="font-size:13px">Notificaciones push</span><span style="font-size:12px;color:var(--tt)"><i class="ti ti-loader-2"></i> Activando...</span></div>`;
  if(st==='denied')return`<div class="rr"><span style="font-size:13px">Notificaciones push</span><div style="display:flex;align-items:center;gap:6px"><span class="bdg" style="background:var(--db);color:var(--ds)">Bloqueadas</span><span style="font-size:11px;color:var(--tt)">Habilitá el permiso en el navegador</span></div></div>`;
  if(st==='subscribed')return`<div class="rr"><span style="font-size:13px;color:var(--gs)"><i class="ti ti-bell-ringing"></i> Push activas en este dispositivo</span><button class="btn" onclick="desuscribirPush()" style="font-size:12px;padding:5px 10px;color:var(--ds);border-color:var(--db2);background:var(--db)"><i class="ti ti-bell-off"></i> Desactivar</button></div>`;
  return`<div class="rr"><span style="font-size:13px">Notificaciones push</span><button class="btn" onclick="suscribirPush()" style="font-size:12px;padding:5px 10px;color:var(--gs);border-color:var(--gb2);background:var(--gb)"><i class="ti ti-bell"></i> Activar</button></div>`;
}

// ── AGENDA DEL ESTUDIO ───────────────────────────────────────────────────
function rAgenda(){
  const wo=S._agendaWo||0;
  const dow=HOY.getDay();
  const wS=(dow===0?-6:1-dow)+wo*7,wE=wS+6;
  const all=aEvs(wS,wE);
  const abogs=[...new Set(S.db.map(e=>e.abogado||'').filter(Boolean))].sort();
  const fil=S._agendaAbog||'';
  const evs=fil?all.filter(x=>x.exp.abogado===fil):all;
  const days=Array.from({length:7},(_,i)=>{const d=new Date(HOY);d.setDate(d.getDate()+wS+i);return{dl:wS+i,date:d};});
  const byDl={};days.forEach(d=>byDl[d.dl]=[]);
  evs.forEach(x=>{if(byDl[x.dl]!==undefined)byDl[x.dl].push(x);});
  const MS=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const DN=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
  const d0=days[0].date,d6=days[6].date;
  const wLabel=`${d0.getDate()} ${MS[d0.getMonth()]}${d0.getFullYear()!==d6.getFullYear()?' '+d0.getFullYear():''} – ${d6.getDate()} ${MS[d6.getMonth()]} ${d6.getFullYear()}`;
  const total=evs.length;
  const abogFilter=abogs.length>1?`<select class="sel" style="font-size:12px;padding:5px 9px;width:auto" onchange="S._agendaAbog=this.value;render()"><option value="">Todos los abogados</option>${abogs.map(a=>`<option value="${a}"${fil===a?' selected':''}>${a}</option>`).join('')}</select>`:'';
  const cols=days.map((d,i)=>{
    const isToday=d.dl===0;
    const items=byDl[d.dl]||[];
    const cards=items.map(x=>{
      const car=(x.exp.car||'').length>19?(x.exp.car||'').substring(0,17)+'…':(x.exp.car||'—');
      const esAud=x.ev.tipo==='audiencia';
      const tit=esAud?(x.ev.desc||'Audiencia'):(TR[x.ev.tr]?.l||x.ev.tr||'Plazo');
      const titShort=tit.length>17?tit.substring(0,15)+'…':tit;
      const gr=esAud?(x.ev.fecha?new Date(x.ev.fecha).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit',hour12:false}):'—'):(x.ev.c?.gr?`gr. ${fmt(x.ev.c.gr)}`:'—');
      const[bg,fg,bdr]={green:['var(--gb)','var(--gs)','var(--gb2)'],orange:['var(--wb)','var(--ws)','var(--wb2)'],blue:['var(--ib)','var(--is)','var(--ib2)']}[x.color]||['var(--bs)','var(--ts)','var(--bt)'];
      return`<div style="background:${bg};border:.5px solid ${bdr};border-radius:6px;padding:5px 7px;margin-bottom:3px"><p style="font-size:11px;font-weight:600;color:${fg};margin:0 0 1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${x.exp.car||''}">${car}</p><p style="font-size:10px;color:var(--ts);margin:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${titShort}</p><p style="font-size:10px;color:var(--tt);margin:0">${gr}</p></div>`;
    }).join('');
    const empty=`<p style="font-size:10px;color:var(--tt);text-align:center;padding:8px 0;margin:0">—</p>`;
    return`<div style="flex:1;min-width:90px"><div style="text-align:center;padding:5px 4px;border-radius:7px 7px 0 0;background:${isToday?'var(--is)':'var(--bs)'};border:.5px solid ${isToday?'var(--is)':'var(--bt)'};margin-bottom:3px"><p style="font-size:9px;font-weight:600;color:${isToday?'#fff':'var(--tt)'};margin:0;text-transform:uppercase;letter-spacing:.04em">${DN[i]}</p><p style="font-size:16px;font-weight:700;color:${isToday?'#fff':'var(--tp)'};margin:0">${d.date.getDate()}</p>${items.length?`<p style="font-size:9px;color:${isToday?'rgba(255,255,255,.75)':'var(--tt)'};margin:0">${items.length} ev.</p>`:''}</div>${items.length?cards:empty}</div>`;
  }).join('');
  return`${rHdr()}<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px"><div><span class="sec" style="margin:0">Agenda del estudio</span><p style="font-size:12px;color:var(--ts);margin:2px 0 0">${wLabel}${total?' · '+total+' evento'+(total!==1?'s':''):' · Sin eventos'}</p></div><div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">${abogFilter}<div style="display:flex;gap:3px"><button class="btn" onclick="S._agendaWo=(S._agendaWo||0)-1;render()" title="Semana anterior" style="padding:5px 10px"><i class="ti ti-chevron-left"></i><span class="ti-fb">&#x2039;</span></button><button class="btn" onclick="S._agendaWo=0;render()" style="padding:5px 10px;font-size:12px${wo===0?';background:var(--ib);color:var(--is);border-color:var(--ib2)':''}">Hoy</button><button class="btn" onclick="S._agendaWo=(S._agendaWo||0)+1;render()" title="Semana siguiente" style="padding:5px 10px"><i class="ti ti-chevron-right"></i><span class="ti-fb">&#x203A;</span></button></div></div></div><div style="display:flex;gap:5px;overflow-x:auto;padding-bottom:8px">${cols}</div>`;
}

function render(){
  document.documentElement.setAttribute('data-theme',S.dark?'dark':'');
  const el=document.getElementById('app');
  if(!S.logueado){
    if(S.view==='forgot')el.innerHTML=rForgotPw();
    else if(S.view==='register')el.innerHTML=rRegister();
    else if(S.view==='login')el.innerHTML=rLogin();
    else el.innerHTML=rLanding();
    return;
  }
  // Save focused search input before DOM replacement
  const _fa=document.activeElement;
  const _fid=_fa&&_fa.dataset?_fa.dataset.sid:null;
  const _fpos=_fa?_fa.selectionStart:null;
  const v=S.view;
  if(v==='panel'){const alertaHtml=(!S._alertaClosed&&!S.tour)?rAlertaApertura():'';el.innerHTML=rPanel()+alertaHtml+(S.tour?rTour():'')+(S._modalEscrito?rModalEscrito():'')+(S._modalCedula?rModalCedula():'')+(S._modalConcil?rModalConcil():'');}
  else if(v==='carga')el.innerHTML=rCarga();
  else if(v==='expedientes'){const alertaHtml=(!S._alertaClosed&&!S.tour)?rAlertaApertura():'';el.innerHTML=rExp()+alertaHtml+(S.tour?rTour():'')+(S._modalEscrito?rModalEscrito():'')+(S._modalCedula?rModalCedula():'')+(S._modalConcil?rModalConcil():'');}
  else if(v==='historial')el.innerHTML=rHist();
  else if(v==='calendario')el.innerHTML=rCal();
  else if(v==='agenda')el.innerHTML=rAgenda();
  else if(v==='alertas')el.innerHTML=rAlrt()+(S._modalNuevaAlerta?rModalNuevaAlerta():'');
  else if(v==='reporte')el.innerHTML=rRpt();
  else if(v==='calculadora')el.innerHTML=rCalc();
  else if(v==='referencia')el.innerHTML=rRef();
  else if(v==='guia')el.innerHTML=rGuia();
  else if(v==='busqueda')el.innerHTML=rBusqGlobal();
  else if(v==='stats')el.innerHTML=rStats();
  else if(v==='config')el.innerHTML=rCfg();
  else if(v==='add-event')el.innerHTML=rEV();
  else if(v==='admin')el.innerHTML=S._usuarioRol==='admin'?rAdminUsuarios():rPanel();
  else el.innerHTML=rPanel();
  // Restore cursor in search inputs after DOM replacement
  if(_fid){
    const _ri=document.querySelector('[data-sid="'+_fid+'"]');
    if(_ri){_ri.focus();try{_ri.setSelectionRange(_fpos,_fpos);}catch(e){}}
  }
}

// ── ATAJOS DE TECLADO ────────────────────────────────────────────────────
document.addEventListener('keydown', function(e){
  if(!S.logueado) return;
  // Don't fire if typing in an input/textarea
  const tag = document.activeElement?.tagName?.toLowerCase();
  if(tag==='input'||tag==='textarea'||tag==='select') return;

  // Escape — cerrar modales
  if(e.key==='Escape'){
    if(S._modalEscrito||S._modalCedula||S._modalConcil||S.tour){
      S._modalEscrito=null;S._modalCedula=null;S._modalConcil=null;
      if(S.tour&&S._usuarioId)ls('sgel_tour_done_'+S._usuarioId,'1');
      S.tour=false;S._tourPaso=0;
      render();return;
    }
    if(S.formExp){S.formExp=false;render();return;}
  }

  // Alt + letra — navegación rápida
  if(e.altKey){
    const map={p:'panel',c:'carga',e:'expedientes',h:'historial',a:'alertas',b:'busqueda',g:'guia',s:'stats'};
    const v=map[e.key.toLowerCase()];
    if(v){e.preventDefault();go(v);}
    // Alt+D — modo oscuro
    if(e.key.toLowerCase()==='d'){e.preventDefault();S.dark=!S.dark;saveProf();render();}
    // Alt+N — nuevo expediente
    if(e.key.toLowerCase()==='n'){e.preventDefault();S.formExp=true;go('expedientes');}
    return;
  }

  // Backspace sin modificador — ir atrás (solo si no hay modal abierto)
  if(e.key==='Backspace'&&!e.altKey&&!e.ctrlKey&&!e.metaKey){
    if(S._navHist.length){e.preventDefault();goBack();}
  }
});
document.fonts.ready.then(()=>{
  const ti=[...document.fonts].find(f=>f.family.replace(/["']/g,'').trim().toLowerCase()==='tabler-icons');
  if(!ti||ti.status!=='loaded')document.documentElement.classList.add('nti');
});
initApp();
</script>
